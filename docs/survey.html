<script>
  document.addEventListener('DOMContentLoaded', function () {
    var toolbar = document.createElement('div');
    toolbar.id = 'ocs-toolbar';

    // Google Translate slot
    var translateSlot = document.createElement('div');
    translateSlot.id = 'google_translate_element';
    toolbar.appendChild(translateSlot);

    // Dark mode button
    var isDark = document.documentElement.classList.contains('dark-mode');
    var btn = document.createElement('button');
    btn.id = 'dark-mode-btn';
    btn.title = 'Toggle dark mode';
    btn.innerHTML = '<i class="fa-solid ' + (isDark ? 'fa-sun' : 'fa-moon') + '"></i>';
    btn.addEventListener('click', function () {
      var dark = document.documentElement.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', dark);
      btn.innerHTML = '<i class="fa-solid ' + (dark ? 'fa-sun' : 'fa-moon') + '"></i>';
    });
    toolbar.appendChild(btn);

    document.body.appendChild(toolbar);
  });
</script>

<script type="text/javascript">
// manage active state of menu based on current page
$(document).ready(function () {
  // active menu anchor
  href = window.location.pathname
  href = href.substr(href.lastIndexOf('/') + 1)
  if (href === "")
    href = "index.html";
  var menuAnchor = $('a[href="' + href + '"]');

  // mark the anchor link active (and if it's in a dropdown, also mark that active)
  var dropdown = menuAnchor.closest('li.dropdown');
  if (window.bootstrap) { // Bootstrap 4+
    menuAnchor.addClass('active');
    dropdown.find('> .dropdown-toggle').addClass('active');
  } else { // Bootstrap 3
    menuAnchor.parent().addClass('active');
    dropdown.addClass('active');
  }

  // Navbar adjustments
  var navHeight = $(".navbar").first().height() + 15;
  var style = document.createElement('style');
  var pt = "padding-top: " + navHeight + "px; ";
  var mt = "margin-top: -" + navHeight + "px; ";

    css += ".section h" + i + "{ " + pt + mt + "}\n";

  document.head.appendChild(style);
});
