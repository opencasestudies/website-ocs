<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

<style>
/* ── Floating toolbar ── */
#ocs-toolbar {
  position: fixed;
  top: 12px;
  right: 16px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.95);
  border: 1px solid #ddd;
  border-radius: 20px;
  padding: 4px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  backdrop-filter: blur(4px);
}
#ocs-toolbar .goog-te-gadget-simple {
  border: none !important;
  background: transparent !important;
  font-size: 0.8rem !important;
  padding: 0 !important;
  white-space: nowrap;
}
#ocs-toolbar .goog-te-gadget-simple img { display: none !important; }
#ocs-toolbar .goog-te-gadget-simple .goog-te-menu-value {
  font-size: 0.8rem;
  color: #238A8D;
}
#ocs-toolbar .goog-te-gadget-simple .goog-te-menu-value span { color: inherit !important; }
.goog-te-menu-frame { max-height: 300px !important; overflow-y: auto !important; }
</style>

<!-- Google Translate -->
<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      {
        pageLanguage: 'en',
        includedLanguages: 'ar,zh-CN,zh-TW,fr,de,hi,id,it,ja,ko,pt,ru,es,sw,vi',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      },
      'google_translate_element'
    );
  }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var toolbar = document.createElement('div');
    toolbar.id = 'ocs-toolbar';

    var translateSlot = document.createElement('div');
    translateSlot.id = 'google_translate_element';
    toolbar.appendChild(translateSlot);

    document.body.appendChild(toolbar);
  });
</script>
